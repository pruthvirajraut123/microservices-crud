spring:
  application:
    name: user-service

  spring:
    h2:
      console:
        enabled: true

    spring:
      datasource:
        url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
        username: sa
        password:
        driver-class-name: org.h2.Driver

    jpa:
      hibernate:
        ddl-auto: update

server:
  port: 8081
